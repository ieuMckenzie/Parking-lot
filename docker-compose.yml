services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gatevision
      POSTGRES_USER: gatevision
      POSTGRES_PASSWORD: gatevision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - prod

volumes:
  pgdata:
