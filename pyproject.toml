[project]
name = "parking-lot"
version = "0.1.0"
description = "Parking lot and truck logistics scanner with YOLO + PaddleOCR"
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "paddleocr>=3.4.0",
    "ultralytics>=8.4.15",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
]

[project.scripts]
parking-scanner = "parking_lot.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parking_lot"]
